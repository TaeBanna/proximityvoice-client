<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Proximity Voice</title>
</head>
<body>
  <h2>Proximity Voice</h2>
  <button onclick="start()">🎤 Start Voice</button>

  <script src="https://unpkg.com/mediasoup-client@3/lib/index.js"></script>

  <script>
    const SERVER_URL = "https://proximityvoice-server.onrender.com";

    let device;
    let socket;
    let sendTransport;
    let recvTransport;

    async function start() {
      socket = new WebSocket(SERVER_URL.replace("https", "wss"));

      socket.onopen = async () => {
        console.log("Connected to server");

        // ขอ router RTP capabilities
        socket.send(JSON.stringify({ type: "getRtpCapabilities" }));
      };

      socket.onmessage = async (event) => {
        const msg = JSON.parse(event.data);
        console.log("← msg:", msg);

        switch (msg.type) {

          case "rtpCapabilities":
            device = new mediasoupClient.Device();
            await device.load({ routerRtpCapabilities: msg.data });

            // สร้าง send transport
            socket.send(JSON.stringify({
              type: "createTransport",
              direction: "send"
            }));
            break;

          case "transportCreated":
            if (msg.direction === "send") {
              sendTransport = device.createSendTransport(msg.data);

              sendTransport.on("connect", ({ dtlsParameters }, callback) => {
                socket.send(JSON.stringify({
                  type: "connectTransport",
                  transportId: sendTransport.id,
                  dtlsParameters
                }));
                callback();
              });

              sendTransport.on("produce", async ({ kind, rtpParameters }, callback) => {
                socket.send(JSON.stringify({
                  type: "produce",
                  transportId: sendTransport.id,
                  kind,
                  rtpParameters
                }));

                socket.onceMessage = (response) => {
                  if (response.type === "produced") {
                    callback({ id: response.producerId });
                  }
                };
              });

              // เปิดไมค์
              const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
              const track = stream.getAudioTracks()[0];
              await sendTransport.produce({ track });

              // สร้าง recv transport
              socket.send(JSON.stringify({
                type: "createTransport",
                direction: "recv"
              }));
            }

            if (msg.direction === "recv") {
              recvTransport = device.createRecvTransport(msg.data);

              recvTransport.on("connect", ({ dtlsParameters }, callback) => {
                socket.send(JSON.stringify({
                  type: "connectTransport",
                  transportId: recvTransport.id,
                  dtlsParameters
                }));
                callback();
              });
            }
            break;

          case "newProducer":
            console.log("New producer:", msg.producerId);

            socket.send(JSON.stringify({
              type: "consume",
              producerId: msg.producerId,
              transportId: recvTransport.id,
              rtpCapabilities: device.rtpCapabilities
            }));
            break;

          case "consumed":
            const consumer = await recvTransport.consume({
              id: msg.id,
              producerId: msg.producerId,
              kind: msg.kind,
              rtpParameters: msg.rtpParameters
            });

            const audio = new Audio();
            audio.srcObject = new MediaStream([consumer.track]);
            audio.autoplay = true;
            audio.play();

            console.log("🔊 Playing audio from:", msg.producerId);
            break;

          case "produced":
            console.log("Producer OK:", msg.producerId);
            break;
        }

        // รองรับ callback produce
        if (socket.onceMessage) {
          socket.onceMessage(msg);
          socket.onceMessage = null;
        }
      };
    }
  </script>
</body>
</html>
